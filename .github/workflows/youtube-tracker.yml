name: YouTube Tracker

on:
  schedule:
    - cron: "0 0 * * *" # Daily at 00:00 UTC
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 1. This safely recreates your Firebase JSON file from your Base64 secret
      - name: Setup Firebase credentials
        if: secrets.FIREBASE_SERVICE_ACCOUNT != ''
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" | base64 --decode > serviceAccountKey.json

      # 2. This only runs the script if the Firebase credentials exist
      - name: Run YouTube tracker
        if: secrets.FIREBASE_SERVICE_ACCOUNT != ''
        run: python main.py
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_IDS: ${{ secrets.YOUTUBE_CHANNEL_IDS }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          FIREBASE_CREDENTIALS_PATH: serviceAccountKey.json
