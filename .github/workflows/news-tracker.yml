name: News Tracker

on:
  schedule:
    - cron: "0 0,6,12,18 * * *" # Every 6 hours at 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 1. This safely recreates your Firebase JSON file from your Base64 secret
      - name: Setup Firebase credentials
        if: secrets.FIREBASE_CREDENTIALS_PATH != ''
        run: |
          echo "${{ secrets.FIREBASE_CREDENTIALS_PATH }}" | base64 --decode > serviceAccountKey.json

      # 2. This only runs the script if the Firebase credentials exist
      - name: Run News tracker
        if: secrets.FIREBASE_CREDENTIALS_PATH != ''
        run: python main_news.py
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          NEWS_TOPICS: ${{ secrets.NEWS_TOPICS }}
          NEWS_KEYWORDS: ${{ secrets.NEWS_KEYWORDS }}
          NEWS_EXCLUDE: ${{ secrets.NEWS_EXCLUDE }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_NEWS_DATABASE_ID: ${{ secrets.NOTION_NEWS_DATABASE_ID }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          FIREBASE_CREDENTIALS_PATH: serviceAccountKey.json
